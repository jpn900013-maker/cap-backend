<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9Captcha - Auth</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar animate-fade-in-up delay-1">
        <div class="nav-container">
            <a href="/" class="brand-logo">
                <div class="brand-icon"><img src="{{ url_for('static', filename='9captcha-logo.png') }}" style="width: 100%; height: auto; border-radius: inherit;"></div>
                <span><span class="gradient-text">9</span>Captcha</span>
            </a>
            <div class="nav-actions">
                <a href="/login" class="btn-secondary btn-sm">Sign In</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="glass-card auth-card animate-fade-in-up delay-2">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p class="text-secondary mt-2">Join 9Captcha to start solving</p>
            </div>

            {% if error_message %}
            <div class="error-message">{{ error_message }}</div>
            {% endif %}

            <form method="POST" action="/register" id="registerForm" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="custom-input w-full" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-group">
                        <input type="password" id="password" name="password" class="custom-input w-full" placeholder="Create a password" required>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <span class="eye-icon">👁</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="password-input-group">
                        <input type="password" id="confirm_password" name="confirm_password" class="custom-input w-full" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <span class="eye-icon">👁</span>
                        </button>
                    </div>
                </div>

                <div class="form-group mt-6 flex justify-center">
                    <div class="h-captcha" data-sitekey="0a1a7e5e-4c58-4a68-8830-56ae84644272" data-theme="dark"></div>
                </div>

                <button type="submit" class="btn-primary w-full mt-6 auth-submit">
                    Sign Up
                </button>
            </form>

            <div class="auth-footer mt-6 text-center">
                <p class="text-secondary text-sm">Already have an account? <a href="/login" class="text-accent font-medium">Log in</a></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.password-input-group').forEach(group => {
                const toggle = group.querySelector('.toggle-password');
                const input = group.querySelector('input');
                if(toggle && input) {
                    toggle.addEventListener('click', () => {
                        const isPass = input.type === 'password';
                        input.type = isPass ? 'text' : 'password';
                        toggle.style.opacity = isPass ? '1' : '0.5';
                    });
                }
            });

            const form = document.getElementById('registerForm');
            function showError(message) {
                let errorDiv = document.querySelector('.error-message');
                if (!errorDiv) {
                    errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message';
                    const formHeader = document.querySelector('.auth-header');
                    formHeader.insertAdjacentElement('afterend', errorDiv);
                }
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }

            form?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const pass = document.getElementById('password').value;
                const conf = document.getElementById('confirm_password').value;
                
                if (pass !== conf) {
                    showError('Passwords do not match.');
                    return;
                }

                const submitButton = form.querySelector('.auth-submit');
                submitButton.disabled = true;
                submitButton.textContent = 'Signing up...';

                try {
                    const formData = new FormData(form);
                    const response = await fetch('/register', { method: 'POST', body: formData });

                    if (response.redirected) {
                        window.location.href = response.url;
                        return;
                    }

                    const data = await response.text();
                    if (data.includes('error-message')) {
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = data;
                        const errorMessage = tempDiv.querySelector('.error-message')?.textContent;
                        if (errorMessage) showError(errorMessage.trim());
                    }
                } catch (error) {
                    showError('An error occurred. Please try again later.');
                } finally {
                    submitButton.disabled = false;
                    submitButton.textContent = 'Sign Up';
                }
            });
        });
    </script>
</body>
</html>
